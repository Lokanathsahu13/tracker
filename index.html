<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tracker — Home</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 12px;
    color: #f8fafc;
  }
  p {
    color: #94a3b8;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 32px;
  }
  a.btn {
    display: inline-block;
    background: #6366f1;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 10px;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  a.btn:hover {
    background: #4f46e5;
    transform: translateY(-2px);
  }
  .footer-note {
    margin-top: 24px;
    font-size: 0.75rem;
    color: #475569;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>👋 Welcome</h1>
    <p>This page load is being tracked in the background. Click below to visit Page 1 — that visit will be tracked too.</p>
    <a class="btn" href="Page 1.html">Go to Page 1 →</a>
    <div class="footer-note">Session data → Firestore · view stats in admin.html</div>
  </div>

  <script type="module" src="tracker.js"></script>
</body>
</html>
